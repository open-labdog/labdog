key: linux-os-upgrade
name: Upgrade OS release
description: >-
  Upgrades to a new major OS release (e.g. Debian 12→13, Ubuntu
  22.04→24.04).
icon: Layers
playbook: playbook.yml
version: "1.0"
estimated_duration: "20–45 min"
destructive: true
supports_group: true
supports_host: true
parameters:
  - key: current_version
    label: Current codename
    type: string
    required: true
    help_text: e.g. bookworm (Debian 12) or jammy (Ubuntu 22.04)
  - key: next_version
    label: Target codename
    type: string
    required: true
    help_text: e.g. trixie (Debian 13) or noble (Ubuntu 24.04)
  - key: cleanup
    label: Remove unused packages
    type: bool
    default: true
