key: k8s-upgrade
name: Upgrade Kubernetes cluster
description: >-
  Drains, upgrades, and re-admits each node in the cluster, one at a
  time. Control plane nodes are upgraded first (kubeadm upgrade
  apply on the first, kubeadm upgrade node on the rest), then workers.
  Apt-only for now (Debian / Ubuntu).
icon: Network
playbook: k8s-upgrade/site.yml
version: "1.0"
estimated_duration: "5–20 min per node"
destructive: true
supports_group: true
supports_host: false
execution_mode: cluster
parameters:
  - key: target_version
    label: Target Kubernetes version
    type: string
    required: true
    help_text: Semver only (e.g. 1.30.4). Must already be downloadable from the apt repo configured on every node.
  - key: skip_preflight
    label: Skip preflight checks
    type: bool
    default: false
    help_text: Bypass the per-node sanity checks. Use sparingly.
  - key: drain_timeout
    label: Drain timeout (seconds)
    type: int
    default: 300
    help_text: Maximum seconds to wait for kubectl drain to evict pods.
