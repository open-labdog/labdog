---
# k8s-upgrade — group-targeted action.
#
# LabDog runs this playbook **once per group** with a flat inventory:
#
#   all:
#     hosts:
#       node-1: { ansible_host: ..., ... }
#       node-2: { ... }
#       node-3: { ... }
#
# `supports_host: false` in the manifest tells LabDog to dispatch
# group-targeted runs as a single ansible-playbook invocation against
# all members (instead of fanning out per-host). The playbook itself
# discovers control-plane vs worker nodes — no labdog-side roles or
# membership attributes involved.
#
# Required extra-vars:
#   target_version    — semver string, e.g. "1.30.4". Matches the
#                       kubeadm/kubelet/kubectl package version that
#                       must already be downloadable from the apt repo
#                       configured on every node.
#   skip_preflight    — bool; bypasses the role's assert block.
#   drain_timeout     — int; seconds to wait for kubectl drain.

- name: Discover cluster topology
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Probe for control-plane manifest
      # The presence of /etc/kubernetes/manifests/kube-apiserver.yaml
      # is the canonical kubeadm-cluster marker for a control-plane
      # node. Workers don't have this file. Probe is read-only.
      ansible.builtin.stat:
        path: /etc/kubernetes/manifests/kube-apiserver.yaml
      register: cp_manifest

    - name: Add to dynamic role group
      ansible.builtin.add_host:
        name: "{{ inventory_hostname }}"
        groups: "k8s_{{ 'control_plane' if cp_manifest.stat.exists else 'worker' }}"

    - name: Refuse if no control plane found
      ansible.builtin.assert:
        that: groups['k8s_control_plane'] | default([]) | length > 0
        fail_msg: >-
          No control-plane node detected in this group
          (looked for /etc/kubernetes/manifests/kube-apiserver.yaml).
          Verify the targeted LabDog group contains every node of the
          cluster, including at least one control-plane node.
      run_once: true

- name: Validate cluster prerequisites
  hosts: k8s_control_plane[0]
  gather_facts: false
  become: true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tasks:
    - name: Verify target_version is a semver
      ansible.builtin.assert:
        that:
          - target_version is defined
          - target_version is match("^[0-9]+\\.[0-9]+\\.[0-9]+$")
        fail_msg: >-
          target_version must be set to a semver like "1.30.4". Got:
          {{ target_version | default('<unset>') }}

    - name: Verify kubectl is on PATH on the driver node
      ansible.builtin.command: kubectl version --client=true -o json
      changed_when: false
      register: kubectl_probe
      failed_when: kubectl_probe.rc != 0

    - name: Every Ansible inventory hostname matches a Kubernetes node
      # LabDog treats inventory hostnames and Kubernetes node names as
      # identical. If they differ (DNS short vs FQDN, or operator
      # mistake during cluster bootstrap) every kubectl drain/uncordon
      # would target a non-existent node, so fail fast.
      ansible.builtin.command: >-
        kubectl get node {{ item }} --no-headers -o name
      loop: "{{ groups['k8s_control_plane'] + groups['k8s_worker'] | default([]) }}"
      changed_when: false
      register: node_probe
      failed_when: node_probe.rc != 0

- name: Upgrade control-plane nodes serially
  hosts: k8s_control_plane
  serial: 1
  become: true
  gather_facts: true
  vars:
    node_role: control_plane
  roles:
    - role: kubernetes-upgrade

- name: Upgrade worker nodes serially
  hosts: k8s_worker
  serial: 1
  become: true
  gather_facts: true
  vars:
    node_role: worker
  roles:
    - role: kubernetes-upgrade
