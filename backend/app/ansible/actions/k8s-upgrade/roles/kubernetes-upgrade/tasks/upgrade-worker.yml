---
# Worker upgrade. Workers also need kubeadm so they can run
# ``kubeadm upgrade node`` (which writes new kubelet config /
# certificates from the cluster's already-upgraded control plane).

- name: Apt-mark unhold the kube packages
  ansible.builtin.command: apt-mark unhold {{ kube_packages | join(' ') }}
  changed_when: true
  failed_when: false

- name: Install kubeadm pinned to {{ target_version }}
  ansible.builtin.apt:
    name: "kubeadm={{ target_version }}-{{ kube_apt_version_suffix }}"
    state: present
    allow_change_held_packages: true
    update_cache: false

- name: Apt-mark hold kubeadm again
  ansible.builtin.command: apt-mark hold kubeadm
  changed_when: true

- name: Run kubeadm upgrade node
  ansible.builtin.command: kubeadm upgrade node
  changed_when: true
