---
# The play layer (playbook.yml) supplies ``node_role`` per-play. We branch
# off it here rather than splitting the role into two roles — the work
# is 80% identical and the two specialisations (first CP runs
# ``kubeadm upgrade plan/apply``; everyone else runs
# ``kubeadm upgrade node``) are 4-line diffs.

- name: Refuse non-Debian-family hosts (apt-only for now)
  # The role uses apt + apt-mark + apt cache modules. RHEL/Rocky/Alma
  # support is tracked in TODO.md; until it lands, fail loudly so the
  # operator doesn't end up with a half-upgraded cluster.
  ansible.builtin.fail:
    msg: >-
      k8s-upgrade currently supports apt-based hosts only
      (Debian / Ubuntu). This host reports os_family={{ ansible_os_family }}.
      RHEL / Rocky / Alma support is on the roadmap.
  when: ansible_os_family != "Debian"

# Idempotency check — supports the "operator re-runs the action after
# a partial failure" workflow. If kubelet on this node is already on
# the target version, treat the node as done and skip the rest of the
# role (drain / kubeadm / packages / restart / uncordon). Re-running
# the action against a group with a mix of upgraded and still-pending
# nodes is now a no-op for the upgraded ones.
- name: Probe current kubelet version
  ansible.builtin.command: kubelet --version
  changed_when: false
  register: _kubelet_version_probe
  failed_when: false   # absent kubelet binary ⇒ not-on-target, continue with upgrade

- name: Mark node as already on target version
  ansible.builtin.set_fact:
    _k8s_already_on_target: >-
      {{ _kubelet_version_probe.rc | default(1) == 0
         and ('v' + target_version) in (_kubelet_version_probe.stdout | default('')) }}

- name: Report already-on-target nodes
  ansible.builtin.debug:
    msg: >-
      Node {{ inventory_hostname }} already on kubelet v{{ target_version }};
      skipping upgrade.
  when: _k8s_already_on_target | bool

- name: Pre-flight checks
  ansible.builtin.import_tasks: preflight.yml
  when:
    - not _k8s_already_on_target | bool
    - not skip_preflight | bool

- name: Drain node — {{ inventory_hostname }}
  ansible.builtin.import_tasks: drain.yml
  when: not _k8s_already_on_target | bool

- name: Install new kubeadm and run kubeadm upgrade
  ansible.builtin.import_tasks: upgrade-control-plane.yml
  when:
    - not _k8s_already_on_target | bool
    - node_role == "control_plane"

- name: Install new kubeadm and run kubeadm upgrade node
  ansible.builtin.import_tasks: upgrade-worker.yml
  when:
    - not _k8s_already_on_target | bool
    - node_role == "worker"

- name: Upgrade kubelet and kubectl to the same target version
  ansible.builtin.import_tasks: upgrade-packages.yml
  when: not _k8s_already_on_target | bool

- name: Restart kubelet and wait for the node to settle
  ansible.builtin.import_tasks: restart-kubelet.yml
  when: not _k8s_already_on_target | bool

- name: Uncordon node — {{ inventory_hostname }}
  ansible.builtin.import_tasks: uncordon.yml
  when: not _k8s_already_on_target | bool
