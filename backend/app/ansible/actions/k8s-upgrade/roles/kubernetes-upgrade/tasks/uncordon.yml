---
# Re-admit the node. Wait for ``kubectl get node`` to show Ready before
# uncordoning — otherwise drain on the next iteration could fail
# because the API server still sees the node as NotReady from the
# kubelet restart.

- name: Wait for {{ inventory_hostname }} to report Ready
  ansible.builtin.command: >-
    kubectl get node {{ inventory_hostname }}
    -o jsonpath={.status.conditions[?(@.type=="Ready")].status}
  delegate_to: "{{ groups['control_plane'] | first }}"
  become: true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: ready_probe
  changed_when: false
  until: ready_probe.stdout | trim == "True"
  retries: 60
  delay: 5

- name: Uncordon {{ inventory_hostname }}
  ansible.builtin.command: kubectl uncordon {{ inventory_hostname }}
  delegate_to: "{{ groups['control_plane'] | first }}"
  become: true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true
