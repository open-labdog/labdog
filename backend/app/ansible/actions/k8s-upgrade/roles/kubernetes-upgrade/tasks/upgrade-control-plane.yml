---
# Control-plane upgrade. The first CP node runs ``kubeadm upgrade
# plan`` (which validates the upgrade graph) followed by ``kubeadm
# upgrade apply``; subsequent CPs run ``kubeadm upgrade node`` because
# the cluster-wide control-plane API has already been bumped by the
# first node.

- name: Hold {{ kube_packages | join(', ') }} so apt doesn't surprise us
  # We unhold + install + re-hold deliberately. Holding kubelet across
  # an unrelated unattended-upgrade run prevents drift; we lift the hold
  # only for this controlled upgrade.
  ansible.builtin.command: apt-mark unhold {{ kube_packages | join(' ') }}
  changed_when: true
  failed_when: false
  # ``failed_when: false`` because apt-mark unhold returns non-zero when
  # nothing is held, and we don't want a fresh node (no holds yet) to
  # break the playbook.

- name: Install kubeadm = {{ target_version }}
  ansible.builtin.apt:
    name: "kubeadm={{ target_version }}-{{ kube_apt_version_suffix }}"
    state: present
    allow_change_held_packages: true
    update_cache: false

- name: Hold kubeadm again
  ansible.builtin.command: apt-mark hold kubeadm
  changed_when: true

- name: kubeadm upgrade plan (first CP only — others have nothing to plan against)
  ansible.builtin.command: kubeadm upgrade plan v{{ target_version }}
  when: inventory_hostname == groups['control_plane'][0]
  register: kubeadm_plan
  changed_when: false
  # ``kubeadm upgrade plan`` is read-only; failures here mean the
  # operator has misconfigured the target version (skipped a minor,
  # incompatible kubeadm/kubelet, etc.). Surface the error and stop.

- name: kubeadm upgrade apply v{{ target_version }} (first CP only)
  ansible.builtin.command: kubeadm upgrade apply v{{ target_version }} --yes
  when: inventory_hostname == groups['control_plane'][0]
  changed_when: true

- name: kubeadm upgrade node (subsequent CPs)
  ansible.builtin.command: kubeadm upgrade node
  when: inventory_hostname != groups['control_plane'][0]
  changed_when: true
