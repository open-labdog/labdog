---
# Per-node sanity checks. The play-level ``Validate cluster
# prerequisites`` covers cluster-wide invariants once on the driver;
# this file runs per node and verifies the node itself is upgradeable.

- name: Verify kubelet is running
  ansible.builtin.systemd_service:
    name: kubelet
    state: started
  check_mode: true
  register: kubelet_unit
  failed_when:
    - kubelet_unit.status is defined
    - kubelet_unit.status.ActiveState | default("inactive") != "active"

- name: Apt cache is fresh enough to install the target version
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 0

- name: Confirm the target kubeadm version is downloadable
  ansible.builtin.shell: |
    set -o pipefail
    apt-cache madison kubeadm \
      | awk -v ver="{{ target_version }}-" 'index($3, ver) == 1 {found=1} END {exit !found}'
  args:
    executable: /bin/bash
  changed_when: false
  register: madison_probe
  failed_when: madison_probe.rc != 0
  # Ansible's stderr is enough — apt-cache will explain itself when the
  # repo isn't configured. We just want to fail BEFORE drain rather
  # than half-way through the upgrade.
