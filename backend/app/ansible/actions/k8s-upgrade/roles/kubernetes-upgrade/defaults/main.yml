---
# Wire from manifest parameters via --extra-vars.
target_version: ""
skip_preflight: false
drain_timeout: 300

# Apt package state. Kubernetes ships per-minor-version repositories at
# pkgs.k8s.io; the operator is expected to have the matching repo
# configured (e.g. ``deb https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /``)
# before triggering this action. We never reconfigure repos here —
# that's a bootstrap concern, not an upgrade one.
kube_packages:
  - kubeadm
  - kubelet
  - kubectl

# We rely on apt's exact-version pinning ("=") and clear apt-mark holds
# only for the duration of the upgrade. This avoids drift between
# kubeadm/kubelet/kubectl during reconvergence — they MUST be
# upgraded together to the same minor.
kube_apt_version_suffix: "*"  # the deb is named like "1.30.4-1.1"; allow any
                              # epoch / debian-rev qualifier
