---
# k8s-upgrade — cluster-mode action.
#
# LabDog runs this playbook **once per group** with a multi-host
# inventory shaped as:
#
#   all:
#     children:
#       control_plane: { hosts: { cp-1: {...}, cp-2: {...} } }
#       workers:       { hosts: { worker-1: {...}, ... } }
#
# Required extra-vars:
#   target_version    — semver string, e.g. "1.30.4". Matches the
#                       kubeadm/kubelet/kubectl package version that
#                       must already be downloadable from the apt repo
#                       configured on every node.
#   skip_preflight    — bool; when true the role's assert block is
#                       bypassed. Operators set this when they know
#                       what they're doing and the preflight is being
#                       too conservative.
#
# Two concerns split into two plays so Ansible's ``serial: 1`` keyword
# can drive the canonical kubeadm flow: control-plane first (one node
# at a time), then workers (one node at a time). The playbook never
# upgrades two nodes concurrently — Kubernetes requires this.
#
# kubectl-driven tasks (drain / uncordon / wait-Ready) delegate to the
# first control-plane host so we don't have to ship a kubeconfig to
# every node or to the LabDog server itself.

- name: Validate cluster prerequisites
  hosts: control_plane[0]
  gather_facts: false
  become: true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  tasks:
    - name: Verify target_version is a semver
      ansible.builtin.assert:
        that:
          - target_version is defined
          - target_version is match("^[0-9]+\\.[0-9]+\\.[0-9]+$")
        fail_msg: >-
          target_version must be set to a semver like "1.30.4". Got:
          {{ target_version | default('<unset>') }}

    - name: Verify kubectl is on PATH on the driver node
      ansible.builtin.command: kubectl version --client=true -o json
      changed_when: false
      register: kubectl_probe
      failed_when: kubectl_probe.rc != 0

    - name: Every Ansible inventory hostname matches a Kubernetes node
      # LabDog treats inventory hostnames and Kubernetes node names as
      # identical. If they differ (DNS short vs FQDN, or operator
      # mistake during cluster bootstrap) every kubectl drain/uncordon
      # would target a non-existent node, so fail fast.
      ansible.builtin.command: >-
        kubectl get node {{ item }} --no-headers -o name
      loop: "{{ groups['control_plane'] + groups['workers'] | default([]) }}"
      changed_when: false
      register: node_probe
      failed_when: node_probe.rc != 0

- name: Upgrade control-plane nodes serially
  hosts: control_plane
  serial: 1
  become: true
  gather_facts: true
  vars:
    node_role: control_plane
  roles:
    - role: kubernetes-upgrade

- name: Upgrade worker nodes serially
  hosts: workers
  serial: 1
  become: true
  gather_facts: true
  vars:
    node_role: worker
  roles:
    - role: kubernetes-upgrade
