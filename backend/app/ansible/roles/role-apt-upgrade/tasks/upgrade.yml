---
# Standard upgrade — always runs

- name: "Upgrade | Check available disk space"
  ansible.builtin.shell: df --output=avail -m / | tail -1
  register: _disk_avail_mb
  changed_when: false

- name: "Upgrade | Abort if disk space is insufficient"
  ansible.builtin.fail:
    msg: >-
      Insufficient disk space on /: {{ _disk_avail_mb.stdout | trim }} MB available,
      {{ min_free_disk_mb }} MB required. Free up space before upgrading.
  when: (_disk_avail_mb.stdout | trim | int) < (min_free_disk_mb | int)

- name: "Upgrade | Check for broken packages"
  ansible.builtin.command: dpkg --audit
  register: _dpkg_audit
  changed_when: false
  failed_when: false

- name: "Upgrade | Abort if broken packages are detected"
  ansible.builtin.fail:
    msg: |
      dpkg reports broken or partially-installed packages. Fix them before upgrading:
      {{ _dpkg_audit.stdout }}
      Run: sudo dpkg --configure -a && sudo apt-get install -f
  when: _dpkg_audit.stdout | length > 0

- name: "Upgrade | Update apt package index"
  ansible.builtin.apt:
    update_cache: true
    update_cache_extra_args: "{{ apt_update_extra_args }}"
  register: _apt_update
  failed_when: false

- name: "Upgrade | Abort if apt update failed"
  ansible.builtin.fail:
    msg: |
      apt-get update failed on {{ inventory_hostname }}.
      Common causes:
        - A third-party repository changed its Suite/Codename (add --allow-releaseinfo-change
          to apt_update_extra_args, or run: sudo apt-get update --allow-releaseinfo-change)
        - A repository GPG key has expired or is missing
        - A repository URL is unreachable
      apt stderr: {{ _apt_update.stderr | default('(none)') }}
  when: _apt_update is failed

- name: "Upgrade | Upgrade packages (safe)"
  ansible.builtin.apt:
    upgrade: safe

- name: "Upgrade | Full-upgrade packages"
  ansible.builtin.apt:
    upgrade: full

- name: "Upgrade | Include cleanup tasks"
  ansible.builtin.include_tasks: cleanup.yml
  when: cleanup | bool

- name: "Upgrade | Check if reboot is required"
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file

- name: "Upgrade | Check for critical running services"
  when:
    - reboot_required_file.stat.exists
    - reboot_skip_if_running | length > 0
  block:
    - name: "Upgrade | Gather service facts"
      ansible.builtin.service_facts:

    - name: "Upgrade | Determine which blocked services are running"
      ansible.builtin.set_fact:
        _running_blocked: >-
          {{ ansible_facts.services
             | dict2items
             | selectattr('value.state', 'equalto', 'running')
             | map(attribute='value.name')
             | intersect(reboot_skip_if_running) }}

    - name: "Upgrade | Warn about services preventing reboot"
      ansible.builtin.debug:
        msg: >-
          Reboot SKIPPED — the following critical services are running:
          {{ _running_blocked | join(', ') }}
      when: _running_blocked | length > 0

- name: "Upgrade | Reboot node if required"
  ansible.builtin.reboot:
    reboot_timeout: "{{ reboot_timeout }}"
    msg: "Reboot triggered by ansible-debian-ubuntu-upgrade playbook"
  when:
    - auto_reboot | bool
    - reboot_required_file.stat.exists
    - not (dist_upgrade | bool)
    - _running_blocked | default([]) | length == 0
