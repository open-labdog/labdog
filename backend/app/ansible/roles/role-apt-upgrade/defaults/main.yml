---
# Whether to perform a distribution upgrade after the standard upgrade
# When true, next_version must also be set
dist_upgrade: false

# Expected current release codename of the node being upgraded
# The playbook verifies ansible_facts['distribution_release'] matches this
# value, preventing accidental version skips (e.g. bullseye -> trixie)
# Required when dist_upgrade is true
# Examples: bookworm (Debian 12), jammy (Ubuntu 22.04)
current_version: ""

# Target release codename for distribution upgrade
# Examples: trixie (Debian 13), noble (Ubuntu 24.04)
# Required when dist_upgrade is true
next_version: ""

# Reboot the node automatically when needed
auto_reboot: true

# Seconds to wait for the node to come back after reboot
reboot_timeout: 300

# Run autoremove and apt clean after upgrade
cleanup: true

# Allow apt to accept repository metadata changes (e.g. codename bumps like
# unifi-10.0 -> unifi-10.1). Without this flag, apt-get update hard-fails when
# a third-party repo changes its Suite/Codename field.
apt_update_extra_args: "--allow-releaseinfo-change"

# Minimum free disk space (in MB) required before upgrading.
# Upgrade is aborted if available space on / is below this threshold.
min_free_disk_mb: 500

# Services that prevent automatic reboot during the standard upgrade
# Dist-upgrade reboot is unconditional (dist-upgrade requires reboot)
# Example: ['ceph-osd', 'mysql', 'pacemaker']
reboot_skip_if_running: [
  'kubelet',
  'pvedaemon',
  'proxmox-backup',
]
