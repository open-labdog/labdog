services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: barricade
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barricade}
      POSTGRES_DB: barricade
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barricade"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  barricade:
    container_name: barricade
    image: barricade:latest
    environment:
      BARRICADE_DATABASE__URL: postgresql+asyncpg://barricade:${POSTGRES_PASSWORD:-barricade}@postgres:5432/barricade
      BARRICADE_REDIS__URL: redis://redis:6379/0
      BARRICADE_SECURITY__SECRET_KEY: "JqQ0wEPKk/u5DFmUuAeBCjAlK9ML2eG/KYNL32VGvkc="
      BARRICADE_SECURITY__ENCRYPTION_KEY: "JqQ0wEPKk/u5DFmUuAeBCjAlK9ML2eG/KYNL32VGvkc="
      BARRICADE_SECURITY__BARRICADE_SERVER_IP: ${BARRICADE_SERVER_IP:-127.0.0.1}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
