services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: barricade
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-barricade}
      POSTGRES_DB: barricade
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barricade"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+asyncpg://barricade:${POSTGRES_PASSWORD:-barricade}@postgres:5432/barricade
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-32-bytes-base64-encoded}
      BARRICADE_SERVER_IP: ${BARRICADE_SERVER_IP:-127.0.0.1}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://barricade:${POSTGRES_PASSWORD:-barricade}@postgres:5432/barricade
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-32-bytes-base64-encoded}
      BARRICADE_SERVER_IP: ${BARRICADE_SERVER_IP:-127.0.0.1}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.tasks", "worker", "--max-tasks-per-child=100", "-Q", "default,long_running", "--loglevel=info"]
    environment:
      DATABASE_URL: postgresql+asyncpg://barricade:${POSTGRES_PASSWORD:-barricade}@postgres:5432/barricade
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-32-bytes-base64-encoded}
      BARRICADE_SERVER_IP: ${BARRICADE_SERVER_IP:-127.0.0.1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "app.tasks", "beat", "--scheduler", "redbeat.RedBeatScheduler", "--loglevel=info"]
    environment:
      DATABASE_URL: postgresql+asyncpg://barricade:${POSTGRES_PASSWORD:-barricade}@postgres:5432/barricade
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-32-bytes-base64-encoded}
      BARRICADE_SERVER_IP: ${BARRICADE_SERVER_IP:-127.0.0.1}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
