# gitleaks config for LabDog
#
# Extends the default ruleset (so new leaks still get caught) and adds
# narrow allowlist entries for known-fixture / known-historical
# false positives.
#
# Add a fingerprint here ONLY after verifying the value is not a
# real production secret. Fingerprint format:
# `<commit>:<path>:<rule>:<line>` — stable for a given commit.

[extend]
useDefault = true

[allowlist]
description = "Test fixtures, dev compose values, and documented placeholders"

paths = [
    '''\.gitlab-ci\.yml$''',
    '''^backend/tests/''',
    '''^frontend/e2e/''',
    '''^labdog\.toml$''',
    # Multi-agent plan doc — Section 6 step-8 uses a fake-PEM string
    # ("-----BEGIN/END OPENSSH PRIVATE KEY-----" wrapping the literal
    # word "fake") to document what to mock in a unit test. The
    # current tree has been replaced with <PEM HEADER>/<PEM FOOTER>
    # placeholders in bedefd9, but the historical commit (2c345a7)
    # still contains the markers and the fingerprint-based
    # .gitleaksignore entry was not honoured. Path-allowlist scoped
    # to this single doc file keeps the blast radius small — it's
    # documentation, not code.
    '''^plans/option-c-coalesced-per-host-sync\.md$''',
]

# Stable fingerprints for known-historical false positives the
# default ruleset flags. Each verified non-production before listing.
stopwords = []

regexes = [
    # CI test encryption key — string and its base64 form. Decodes to
    # literal "ci-test-encryption-key-32bytes".
    '''ci-test-encryption-key-32bytes''',
    '''Y2ktdGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVz''',
    # Conftest test key (asserted in tests/conftest.py).
    '''vrPDeLMuFGehy2sYV//fyTd7EmnvOKbE2n4h7XM/8zg=''',
    # Test secret key string used by CI + tests.
    '''(ci-)?test-secret-key-not-for-production''',
    # Old Barricade-era dev compose values, never used in production
    # and superseded by the rebranded LABDOG_* env vars in dev/labdog.toml.
    '''BARRICADE_SECURITY__SECRET_KEY''',
    '''BARRICADE_SECURITY__ENCRYPTION_KEY''',
]
