# ============================================================
# Barricade Development Configuration
# ============================================================
# This file is used by dev.sh and local development.
# For production, see packaging/etc/barricade.toml

[server]
host = "0.0.0.0"
port = 8000
# static_dir = ""  # Path to frontend static export (empty = auto-detect)

[database]
url = "postgresql+asyncpg://barricade:barricade@localhost:5432/barricade"

[redis]
url = "redis://localhost:6379/0"

[security]
secret_key = "dev-only-change-me-in-production"
encryption_key = "dev-only-change-me-32-bytes-base64"
barricade_server_ip = "127.0.0.1"
allowed_origins = ["http://localhost:3000"]
cookie_secure = false
session_lifetime_seconds = 86400

[tls]
# TLS disabled in development

[rate_limit]
enabled = false

[logging]
level = "debug"
format = "text"
audit_retention_days = 90

[ssh]
max_sessions_per_user = 5
max_total_sessions = 50
idle_timeout_seconds = 1800

[discovery]
min_prefix = 20
scan_timeout = 1.0
max_concurrent = 100
max_bulk_add = 50

[drift]
check_interval_minutes = 30
