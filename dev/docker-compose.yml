services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: labdog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-labdog_test_pw}
      POSTGRES_DB: labdog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labdog"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  labdog:
    container_name: labdog
    image: labdog:latest
    environment:
      LABDOG_DATABASE__URL: postgresql+asyncpg://labdog:${POSTGRES_PASSWORD:-labdog_test_pw}@postgres:5432/labdog
      LABDOG_REDIS__URL: redis://redis:6379/0
      LABDOG_SECURITY__SECRET_KEY: "${LABDOG_SECURITY__SECRET_KEY}"
      LABDOG_SECURITY__ENCRYPTION_KEY: "${LABDOG_SECURITY__ENCRYPTION_KEY}"
      LABDOG_SECURITY__LABDOG_SERVER_IP: ${LABDOG_SECURITY__LABDOG_SERVER_IP:-127.0.0.1}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
