# ============================================================
# LabDog Development Configuration
# ============================================================
# This file is used by dev.sh and local development.
# For production, see packaging/etc/labdog.toml
#
# Operational settings (drift interval, SSH timeout, Ansible timeout,
# discovery tuning, log level, audit retention) are managed via the
# Settings page in the UI and stored in the database.

[server]
host = "0.0.0.0"
port = 8000
# static_dir = ""  # Path to frontend static export (empty = auto-detect)

[database]
url = "postgresql+asyncpg://labdog:labdog_test_pw@localhost:5432/labdog"

[redis]
url = "redis://localhost:6379/0"

[security]
secret_key = "change-me-in-production"
encryption_key = "change-me-32-bytes-base64-encoded"
labdog_server_ip = "127.0.0.1"
allowed_origins = ["http://localhost:3000"]
cookie_secure = false
session_lifetime_seconds = 86400

[tls]
# TLS disabled in development

[rate_limit]
enabled = false

[logging]
format = "text"

[ssh]
max_sessions_per_user = 5
max_total_sessions = 50

[celery]
concurrency = 4          # Number of worker processes
max_tasks_per_child = 100 # Recycle worker after N tasks (prevents memory leaks)

[discovery]
min_prefix = 20
max_bulk_add = 50

[ansible]
# Dev-writable checkout dir for git-backed action packs. Production
# defaults to /var/lib/labdog/packs which dev users can't write to.
packs_root_dir = "/tmp/labdog-dev-packs"
