# Managed by Barricade
#
# Example GitOps rule file for a web server group.
# Point a Git repository at this file via the Barricade UI:
#   Groups → [group] → Enable GitOps → set file path to "examples/gitops/web-servers.yaml"
#
# On push (or manual import), Barricade parses this file, diffs against
# the current DB state, and applies changes. Rules are synced to hosts
# via Ansible on the next sync.
#
# Schema reference:
#   group:     string   — must match the Barricade group name
#   priority:  int      — informational (group priority is set in the UI)
#   firewall:
#     rules:   list     — ordered list of firewall rules
#
# Rule fields:
#   action:    allow | deny | reject
#   protocol:  tcp | udp | icmp | any
#   direction: input | output
#   source:    CIDR (optional, e.g. "10.0.0.0/8", "0.0.0.0/0")
#   dest:      CIDR (optional)
#   port:      int or "start-end" range (optional, not allowed with icmp)
#   comment:   string (optional)

group: web-servers
priority: 100

firewall:
  rules:
    # --- Inbound ---

    # Allow SSH from internal network only
    - action: allow
      protocol: tcp
      direction: input
      source: "10.0.0.0/8"
      port: 22
      comment: "SSH — internal only"

    # Allow HTTP and HTTPS from anywhere
    - action: allow
      protocol: tcp
      direction: input
      port: 80
      comment: "HTTP"

    - action: allow
      protocol: tcp
      direction: input
      port: 443
      comment: "HTTPS"

    # Allow ICMP (ping) from anywhere
    - action: allow
      protocol: icmp
      direction: input
      comment: "Ping"

    # Allow high ports for established connections (e.g. apt, curl responses)
    - action: allow
      protocol: tcp
      direction: input
      port: "1024-65535"
      source: "0.0.0.0/0"
      comment: "Ephemeral ports — return traffic"

    # Deny everything else inbound
    - action: deny
      protocol: any
      direction: input
      comment: "Default deny inbound"

    # --- Outbound ---

    # Allow DNS
    - action: allow
      protocol: udp
      direction: output
      port: 53
      comment: "DNS"

    - action: allow
      protocol: tcp
      direction: output
      port: 53
      comment: "DNS over TCP"

    # Allow HTTP/HTTPS outbound (apt updates, API calls)
    - action: allow
      protocol: tcp
      direction: output
      port: 80
      comment: "HTTP outbound"

    - action: allow
      protocol: tcp
      direction: output
      port: 443
      comment: "HTTPS outbound"

    # Allow NTP
    - action: allow
      protocol: udp
      direction: output
      port: 123
      comment: "NTP"

    # Deny everything else outbound
    - action: deny
      protocol: any
      direction: output
      comment: "Default deny outbound"
