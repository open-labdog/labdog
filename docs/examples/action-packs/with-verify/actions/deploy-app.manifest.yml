key: deploy-app
name: Deploy app
description: >-
  Installs a new build of the app and restarts the service. After the
  deploy completes, a pack-supplied verify playbook confirms the
  service is up, the healthz endpoint returns ok, and the running
  version matches what was deployed. Any failure in the verify step
  triggers a Proxmox snapshot rollback.
icon: ArrowUpFromLine
playbook: deploy-app.yml
version: "1.0"
estimated_duration: "1–3 min"
destructive: true
supports_group: false
supports_host: true
verify_playbook: deploy-app-verify.yml
verify_timeout_seconds: 120
parameters:
  - key: version
    label: Version to deploy
    type: string
    required: true
    help_text: e.g. 1.4.2
  - key: service_name
    label: systemd service unit
    type: string
    default: myapp
  - key: port
    label: Health-check port
    type: int
    default: 8080
