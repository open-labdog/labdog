# Managed by LabDog — DNS resolver reference
#
# Resolver is the only SINGLETON module — there is at most ONE resolver
# config per group (and one per host for overrides).  This has two
# consequences different from the list-shaped modules:
#
#   1. Omitting the `resolver:` section (or setting it to `null`)
#      LEAVES THE CURRENT DB STATE ALONE.  It does NOT wipe — this is
#      the leave-alone exception documented in `schema.py`.  If you
#      want to explicitly clear the group's resolver config, use the
#      DELETE button in the UI.
#
#   2. Full-replace semantics.  When the section is present, the DB row
#      is upserted.  There is no per-field merge.
#
# Fields:
#   nameservers      list[str]  — required, 1..3 items (resolv.conf limit).
#                                 IPv4 or IPv6 addresses.  ORDER MATTERS
#                                 (fallback order); preserved byte-for-byte.
#   search_domains   list[str]  — 0..6 items. Valid DNS labels.  Order
#                                 matters and is preserved.
#   options          dict       — default {}. Allowed keys:
#                                    ndots    (0..15)
#                                    timeout  (0..15)
#                                    attempts (0..15)
#                                    rotate   (any int/str truthy)
#                                    edns0    (any int/str truthy)
#                                 Unknown keys raise a parse error.
#   resolver_type    enum       — resolv_conf | systemd_resolved |
#                                 networkmanager.  Default: resolv_conf.
#   dns_over_tls     bool       — default false.  Silently falsified
#                                 unless resolver_type == systemd_resolved
#                                 (matches the Pydantic validator on
#                                 ResolverConfigCreate).
#
# Backend-specific file targets:
#   resolv_conf        → /etc/resolv.conf
#   systemd_resolved   → /etc/systemd/resolved.conf
#   networkmanager     → NetworkManager global-dns section

group: resolver-reference
priority: 100

# ─────────────────────────────────────────────────────────────
# Option 1: classic /etc/resolv.conf
# ─────────────────────────────────────────────────────────────
resolver:
  resolver_type: resolv_conf
  nameservers:
    - "10.0.0.2"
    - "10.0.0.3"
    - "1.1.1.1"
  search_domains:
    - "internal.corp"
    - "prod.internal.corp"
  options:
    timeout: 2
    attempts: 3
    rotate: 1

# ─────────────────────────────────────────────────────────────
# Option 2: systemd-resolved with DNS-over-TLS.
# (Uncomment this block and comment out Option 1 to use it — only one
# `resolver:` block may appear in a YAML file.)
# ─────────────────────────────────────────────────────────────
# resolver:
#   resolver_type: systemd_resolved
#   nameservers:
#     - "1.1.1.1"
#     - "9.9.9.9"
#   search_domains:
#     - "internal.corp"
#   options:
#     ndots: 1
#   dns_over_tls: true

# ─────────────────────────────────────────────────────────────
# Option 3: NetworkManager.  DOT silently falsified here.
# ─────────────────────────────────────────────────────────────
# resolver:
#   resolver_type: networkmanager
#   nameservers:
#     - "10.0.0.2"
#   search_domains: []
#   options: {}
#   dns_over_tls: true     # <-- silently becomes false on import

# ─────────────────────────────────────────────────────────────
# To LEAVE-ALONE (no change on import), simply omit the entire
# `resolver:` key.  There is no `resolver: null` shortcut — both
# "omitted" and "null" produce the same leave-alone behaviour.
#
# To DELETE the group's resolver config from the UI:
#   Group → Resolver → Delete button.
# GitOps cannot perform an explicit delete (by design — too easy to
# brick network if the wrong commit lands).
