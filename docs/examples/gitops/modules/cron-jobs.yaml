# Managed by LabDog — Cron jobs reference
#
# Fields:
#   name         string    — required; matches [a-zA-Z0-9][a-zA-Z0-9_-]*,
#                            max 100 chars.  Used as the file name in
#                            /etc/cron.d/ after being prefixed with
#                            `labdog-`.
#   user         string    — default "root".  The user the cron job runs
#                            as.  Must match [a-zA-Z0-9_][a-zA-Z0-9_.-]*
#                            (no shell metacharacters), max 32 chars.
#   schedule     string    — required.  Any valid cron expression
#                            (5 fields: min hour dom mon dow).  Schedule
#                            strings are preserved BYTE-IDENTICALLY
#                            across imports — do not rely on `*/5` and
#                            `0/5` being treated as equivalent.
#   command      string    — required; non-empty.  The shell snippet
#                            executed on the schedule.
#   environment  dict      — default {}.  Env vars passed to the command.
#                            Key order in YAML is NOT significant for
#                            the diff (sorted before compare).
#   state        enum      — present | absent.  Default: present.
#                            `absent` causes Ansible to remove the job
#                            file on next sync.
#   priority     int       — 0..10000, default 0.
#   comment      string    — optional; shown in the UI.
#
# Merge identity key: (`name`, `user`).  Same job name with different
# users (e.g. root vs postgres) coexist; same name + user conflict is
# resolved by priority.

group: cron-jobs-reference
priority: 100

cron_jobs:
  # ─────────────────────────────────────────────────────────────
  # Simple daily job
  # ─────────────────────────────────────────────────────────────
  - name: log-rotate
    user: root
    schedule: "0 0 * * *"
    command: "/usr/sbin/logrotate /etc/logrotate.conf"
    state: present
    comment: "Rotate system logs at midnight"

  # ─────────────────────────────────────────────────────────────
  # Job with environment — PATH is especially useful because cron's
  # default PATH is minimal.
  # ─────────────────────────────────────────────────────────────
  - name: cert-renew
    user: root
    schedule: "0 3 * * 0"
    command: "certbot renew --quiet"
    environment:
      PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      LANG: "C.UTF-8"
    state: present
    comment: "Weekly ACME cert renewal"

  # ─────────────────────────────────────────────────────────────
  # Running as a non-root service user — common pattern for DB
  # backups so pg_dump picks up peer auth.
  # ─────────────────────────────────────────────────────────────
  - name: pgdump-nightly
    user: postgres
    schedule: "0 1 * * *"
    command: "/usr/bin/pg_dumpall > /var/backups/postgres/$(date +\\%F).sql"
    environment:
      PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    state: present
    comment: "Logical DB backup"

  # ─────────────────────────────────────────────────────────────
  # Same `name`, different `user` — coexist.  Useful when you want
  # per-user variants of a named task.
  # ─────────────────────────────────────────────────────────────
  - name: backup
    user: root
    schedule: "0 2 * * *"
    command: "/opt/backup/full.sh"
    state: present

  - name: backup
    user: postgres
    schedule: "0 1 * * *"
    command: "pg_dump mydb > /tmp/mydb.sql"
    state: present

  # ─────────────────────────────────────────────────────────────
  # Common schedule patterns.  All are byte-stable round-trip.
  # ─────────────────────────────────────────────────────────────

  # Every 5 minutes
  - name: metrics-push
    user: root
    schedule: "*/5 * * * *"
    command: "/usr/local/bin/push-metrics"
    state: present

  # Every weekday at 9am
  - name: weekday-report
    user: reports
    schedule: "0 9 * * 1-5"
    command: "/opt/reports/generate.sh"
    state: present

  # First Monday of the month at 2:30am
  - name: monthly-audit
    user: root
    schedule: "30 2 1-7 * 1"
    command: "/opt/audit/run.sh"
    state: present

  # ─────────────────────────────────────────────────────────────
  # Remove an old job (explicit absent).  LabDog will delete
  # /etc/cron.d/labdog-old-job on next sync.
  # ─────────────────────────────────────────────────────────────
  - name: old-job
    user: root
    schedule: "0 0 * * *"
    command: "/usr/bin/true"
    state: absent
    comment: "Retired — leave entry so removal is explicit for one cycle"
