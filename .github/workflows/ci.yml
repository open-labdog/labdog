name: CI

# Mirrors the old .gitlab-ci.yml stages: lint → test → build → scan.
#
# Triggers:
#   * push to main     → run everything, publish prod image (latest + sha)
#   * push to dev      → run everything, publish test image (test + test-sha)
#   * pull_request to  → run lint + test + build-test-image + scans
#       main / dev
#   * workflow_dispatch → manual trigger from the Actions tab
#
# Secrets required (configure in repo Settings → Secrets and variables):
#   * DOCKER_HUB_PAT  — Docker Hub personal access token (secret)
#
# Variables required (same screen, "Variables" tab):
#   * DOCKER_HUB_REPO — full repo path in Docker Hub, e.g. "myuser/labdog".
#     The username portion (first segment) is extracted automatically for
#     login; the full value is used as the image name.

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ---- LINT -------------------------------------------------------------

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install -U pip ruff -q
      - name: ruff check
        working-directory: backend
        run: ruff check .
      - name: ruff format --check
        working-directory: backend
        run: ruff format --check .

  backend-sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install bandit
        run: pip install -U pip "bandit>=1.9" -q
      - name: bandit (low+ with baseline)
        working-directory: backend
        run: bandit -r app/ -l --baseline bandit-baseline.json

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        working-directory: frontend
        run: npm ci --prefer-offline
      - name: npm run lint
        working-directory: frontend
        run: npm run lint


  # ---- TEST -------------------------------------------------------------

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: labdog_test
          POSTGRES_USER: labdog
          POSTGRES_PASSWORD: labdog
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://labdog:labdog@localhost:5432/labdog_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENCRYPTION_KEY: Y2ktdGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -U pip uv -q
          uv pip install --system '.[dev]'
      - name: pytest
        working-directory: backend
        run: python -m pytest tests/ -v -m "not integration" --ignore=tests/integration

  frontend-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        working-directory: frontend
        run: npm ci --prefer-offline
      - name: npm run build
        working-directory: frontend
        run: npm run build

  docs-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: npm ci
        working-directory: website
        run: npm ci --prefer-offline
      - name: npm run build
        working-directory: website
        run: npm run build


  # ---- BUILD & PUBLISH --------------------------------------------------
  #
  # build-image runs only on push to main; build-test-image on push to dev
  # and on workflow_dispatch. Both log into Docker Hub using DOCKER_HUB_PAT.
  # The username is extracted from the first segment of DOCKER_HUB_REPO.

  build-image:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-build-check]
    steps:
      - uses: actions/checkout@v4
      - name: Derive Docker Hub username from DOCKER_HUB_REPO
        run: |
          if [ -z "${{ vars.DOCKER_HUB_REPO }}" ]; then
            echo "::error::DOCKER_HUB_REPO variable is not set"
            exit 1
          fi
          echo "DOCKER_HUB_USER=$(echo '${{ vars.DOCKER_HUB_REPO }}' | cut -d/ -f1)" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PAT }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_HUB_REPO }}:latest
            ${{ vars.DOCKER_HUB_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-test-image:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-build-check]
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4
      - name: Derive Docker Hub username from DOCKER_HUB_REPO
        run: |
          if [ -z "${{ vars.DOCKER_HUB_REPO }}" ]; then
            echo "::error::DOCKER_HUB_REPO variable is not set"
            exit 1
          fi
          echo "DOCKER_HUB_USER=$(echo '${{ vars.DOCKER_HUB_REPO }}' | cut -d/ -f1)" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PAT }}
      - id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "image_ref=${{ vars.DOCKER_HUB_REPO }}:test-$SHORT_SHA" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_HUB_REPO }}:test
            ${{ vars.DOCKER_HUB_REPO }}:test-${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  pages-build:
    # Build the docs site on every push that could affect it. Deploy step
    # is separate and only runs on main.
    runs-on: ubuntu-latest
    needs: [docs-build-check]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Build
        working-directory: website
        run: |
          npm ci --prefer-offline
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  pages-deploy:
    # Publishes the built docs site to GitHub Pages on main only.
    # Requires the repository to have Pages enabled in Settings → Pages,
    # with "Build and deployment → Source" set to "GitHub Actions".
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [pages-build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4


  # ---- SECURITY SCANS ---------------------------------------------------

  trivy-scan:
    # Only runs when a test image was just built (dev push or manual run).
    if: >-
      always() &&
      needs.build-test-image.result == 'success'
    needs: [build-test-image]
    runs-on: ubuntu-latest
    steps:
      - name: Trivy — informational scan (low/medium)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ needs.build-test-image.outputs.image_ref }}
          severity: LOW,MEDIUM
          exit-code: "0"
          ignore-unfixed: "true"
      - name: Trivy — gate on HIGH/CRITICAL
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ needs.build-test-image.outputs.image_ref }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: "true"

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install pip-audit + project
        working-directory: backend
        run: |
          pip install -U pip uv pip-audit -q
          uv pip install --system . -q
      - name: pip-audit
        working-directory: backend
        run: pip-audit --progress-spinner off

  frontend-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        working-directory: frontend
        run: npm ci --prefer-offline
      - name: npm audit (high+, production only)
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev
