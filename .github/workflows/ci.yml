name: CI

# Trigger model — workflow_dispatch mirrors the natural trigger for
# the chosen ref:
#   * PR to dev OR dispatch on a feature/dev branch
#       → full suite: lint, test, build test image, scans
#   * push OR dispatch on main
#       → build and publish prod image + deploy docs
#   * push OR dispatch on a v* tag
#       → build release artifacts
#
# Direct pushes to main are blocked by branch protection. All changes
# flow through dev PRs; by the time a dev→main PR merges, every check
# has already passed.
#
# Secrets required (configure in repo Settings → Secrets and variables):
#   * DOCKER_HUB_PAT  — Docker Hub personal access token (secret)
#
# Variables required (same screen, "Variables" tab):
#   * DOCKER_HUB_REPO — full repo path in Docker Hub, e.g. "myuser/labdog".
#     The username portion (first segment) is extracted automatically for
#     login; the full value is used as the image name.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ---- LINT -------------------------------------------------------------

  backend-lint:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch'
       && github.ref != 'refs/heads/main'
       && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install -U pip ruff -q
      - name: ruff check
        working-directory: backend
        run: ruff check .
      - name: ruff format --check
        working-directory: backend
        run: ruff format --check .

  backend-sast:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch'
       && github.ref != 'refs/heads/main'
       && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install bandit
        run: pip install -U pip "bandit>=1.9" -q
      - name: bandit (low+ with baseline)
        working-directory: backend
        run: bandit -r app/ -l --baseline bandit-baseline.json

  ansible-lint:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch'
       && github.ref != 'refs/heads/main'
       && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ansible-lint
        run: pip install -U pip "ansible-lint>=24" "ansible-core>=2.16" -q
      - name: ansible-lint
        run: ansible-lint --strict backend/app/ansible/actions/k8s-upgrade

  frontend-lint:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch'
       && github.ref != 'refs/heads/main'
       && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        working-directory: frontend
        run: npm ci --prefer-offline
      - name: npm run lint
        working-directory: frontend
        run: npm run lint


  # ---- TEST -------------------------------------------------------------

  backend-test:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch'
       && github.ref != 'refs/heads/main'
       && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: labdog_test
          POSTGRES_USER: labdog
          POSTGRES_PASSWORD: labdog
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://labdog:labdog@localhost:5432/labdog_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENCRYPTION_KEY: Y2ktdGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVz
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -U pip uv -q
          uv pip install --system '.[dev]'
      - name: pytest
        working-directory: backend
        run: python -m pytest tests/ -v -m "not integration" --ignore=tests/integration

  frontend-build-check:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch'
       && github.ref != 'refs/heads/main'
       && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        working-directory: frontend
        run: npm ci --prefer-offline
      - name: npm run build
        working-directory: frontend
        run: npm run build

  docs-build-check:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch'
       && github.ref != 'refs/heads/main'
       && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: npm ci
        working-directory: website
        run: npm ci --prefer-offline
      - name: npm run build
        working-directory: website
        run: npm run build


  # ---- BUILD & PUBLISH --------------------------------------------------
  #
  # build-image runs on push to main (tests already passed on the dev PR).
  # build-test-image runs on PRs to dev and workflow_dispatch for trivy.
  # Both log into Docker Hub using DOCKER_HUB_PAT.
  # The username is extracted from the first segment of DOCKER_HUB_REPO.

  build-image:
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Derive Docker Hub username from DOCKER_HUB_REPO
        id: hub
        run: |
          if [ -z "${{ vars.DOCKER_HUB_REPO }}" ]; then
            echo "::error::DOCKER_HUB_REPO variable is not set"
            exit 1
          fi
          echo "user=$(echo '${{ vars.DOCKER_HUB_REPO }}' | cut -d/ -f1)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ steps.hub.outputs.user }}
          password: ${{ secrets.DOCKER_HUB_PAT }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_HUB_REPO }}:latest
            ${{ vars.DOCKER_HUB_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-test-image:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch'
       && github.ref != 'refs/heads/main'
       && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-build-check]
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4
      - name: Derive Docker Hub username from DOCKER_HUB_REPO
        id: hub
        run: |
          if [ -z "${{ vars.DOCKER_HUB_REPO }}" ]; then
            echo "::error::DOCKER_HUB_REPO variable is not set"
            exit 1
          fi
          echo "user=$(echo '${{ vars.DOCKER_HUB_REPO }}' | cut -d/ -f1)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ steps.hub.outputs.user }}
          password: ${{ secrets.DOCKER_HUB_PAT }}
      - id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "image_ref=${{ vars.DOCKER_HUB_REPO }}:test-$SHORT_SHA" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_HUB_REPO }}:test
            ${{ vars.DOCKER_HUB_REPO }}:test-${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  pages-build:
    # Build and upload the docs site artifact for main. Deploy step
    # follows immediately after.
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Build
        working-directory: website
        run: |
          npm ci --prefer-offline
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  pages-deploy:
    # Publishes the built docs site to GitHub Pages on main only.
    # Requires the repository to have Pages enabled in Settings → Pages,
    # with "Build and deployment → Source" set to "GitHub Actions".
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/main'
    needs: [pages-build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4


  # ---- RELEASE ARTIFACTS ------------------------------------------------
  #
  # Runs on push or dispatch of a v* tag and produces .tar.gz / .deb /
  # .rpm / SHA256SUMS via packaging/build.sh, then attaches them to an
  # auto-created GitHub Release via softprops/action-gh-release. To
  # smoke-test the packaging path without cutting a real release, run
  # ./packaging/build.sh locally — there's no longer a CI dry-run mode.

  release-artifacts:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for action-gh-release to create the release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install nfpm (for .deb / .rpm)
        run: |
          NFPM_VERSION=2.41.3
          curl -sSL \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xzC /usr/local/bin nfpm
          nfpm --version
      - name: Derive version string
        id: ver
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building release artifacts for version $VERSION"
      - name: Sync version files to tag
        # Rewrite backend/pyproject.toml and frontend/package.json so
        # the in-tree version strings match the tag before the build
        # step bakes them into the artifacts.
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          # backend/pyproject.toml — sed regex anchored to start of
          # line. The file has exactly one top-level `version = "..."`
          # entry under [project]; the assertion below fails the build
          # if a future edit introduces a second match.
          MATCHES=$(grep -c '^version = ' backend/pyproject.toml)
          if [ "$MATCHES" != "1" ]; then
            echo "::error::expected exactly 1 top-level version line in backend/pyproject.toml, found $MATCHES"
            exit 1
          fi
          sed -i "s/^version = \".*\"/version = \"${V}\"/" backend/pyproject.toml
          python -c "import tomllib; d=tomllib.load(open('backend/pyproject.toml','rb')); assert d['project']['version']=='${V}', d['project']['version']"

          # frontend/package.json — JSON.parse + JSON.stringify
          # round-trip. Preserves 2-space indent and trailing newline.
          node -e "const f='frontend/package.json'; const j=JSON.parse(require('fs').readFileSync(f,'utf8')); j.version=process.env.V; require('fs').writeFileSync(f, JSON.stringify(j, null, 2)+'\n')"
          node -e "const j=JSON.parse(require('fs').readFileSync('frontend/package.json','utf8')); if(j.version!==process.env.V){console.error('version mismatch:',j.version);process.exit(1)}"

          echo "Synced backend/pyproject.toml and frontend/package.json to ${V}"
      - name: Build release artifacts
        run: ./packaging/build.sh --version="${{ steps.ver.outputs.version }}"
      - name: Generate unified SHA256SUMS
        working-directory: packaging/dist
        run: |
          sha256sum labdog-* labdog_* > SHA256SUMS
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS
      - name: List artifacts
        run: ls -la packaging/dist/
      - name: Upload artifacts to workflow run
        # Mirror the artifacts onto the workflow run so a failed
        # release-create still lets you download what was built.
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ steps.ver.outputs.version }}
          path: packaging/dist/
          retention-days: 7
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packaging/dist/*.tar.gz
            packaging/dist/*.deb
            packaging/dist/*.rpm
            packaging/dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true


  # ---- SECURITY SCANS ---------------------------------------------------

  trivy-scan:
    # Only runs when a test image was just built (PR to dev or manual run).
    if: >-
      always() &&
      needs.build-test-image.result == 'success'
    needs: [build-test-image]
    runs-on: ubuntu-latest
    steps:
      - name: Trivy — informational scan (low/medium)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ needs.build-test-image.outputs.image_ref }}
          severity: LOW,MEDIUM
          exit-code: "0"
          ignore-unfixed: "true"
      - name: Trivy — gate on HIGH/CRITICAL
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ needs.build-test-image.outputs.image_ref }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: "true"

  gitleaks:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch'
       && github.ref != 'refs/heads/main'
       && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bundled-pack-mirror:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch'
       && github.ref != 'refs/heads/main'
       && !startsWith(github.ref, 'refs/tags/'))
    # Verify the in-image bundled pack at backend/app/ansible/ stays
    # byte-identical to a tagged release of open-labdog/labdog-playbooks.
    # The script no-ops cleanly until labdog-playbooks publishes its
    # first tag — until then it just reports "not yet published" and
    # passes. Bump PLAYBOOKS_REF to a release tag once published.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify bundled pack mirrors labdog-playbooks
        env:
          PLAYBOOKS_REF: main
        run: ./scripts/check-bundled-mirrors-playbooks.sh

  backend-audit:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch'
       && github.ref != 'refs/heads/main'
       && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install pip-audit + project
        working-directory: backend
        run: |
          pip install -U pip uv pip-audit -q
          uv pip install --system . -q
      - name: pip-audit
        working-directory: backend
        # CVE-2026-3219 / GHSA-58qw-9mgm-455v: pip itself has an
        # interpretation conflict between concatenated tar+ZIP archives.
        # Affects every pip release ≤ 26.0.1; upstream fix is in
        # https://github.com/pypa/pip/pull/13870 but no patched pip is
        # on PyPI yet. The vulnerability is in pip's archive handling
        # during `pip install`; LabDog never invokes pip on user input,
        # so the attack surface is "the maintainer pip-installs a
        # malicious package while building" — same threat model as any
        # other supply-chain attack on the build host. Re-evaluate when
        # the patched pip ships and drop this exception.
        run: pip-audit --progress-spinner off --ignore-vuln GHSA-58qw-9mgm-455v

  frontend-audit:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch'
       && github.ref != 'refs/heads/main'
       && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        working-directory: frontend
        run: npm ci --prefer-offline
      - name: npm audit (high+, production only)
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev
