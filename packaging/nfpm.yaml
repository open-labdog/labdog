# yaml-language-server: $schema=https://nfpm.goreleaser.com/schema.json
name: labdog
arch: amd64
platform: linux
version: ${VERSION}
release: "1"
maintainer: "LabDog <labdog@labdog.io>"
description: |
  LabDog — a homelabber's best friend.
  Linux node configuration management platform. Manages firewall rules,
  services, users, cron jobs, /etc/hosts, and more using Ansible under
  the hood with a web UI and drift detection.
  Requires PostgreSQL 14+ and Redis 6+.
homepage: https://github.com/labdog/labdog
license: MIT

# Runtime deps (Python deps bundled in venv)
depends:
  - python3 (>= 3.12)

recommends:
  - postgresql-client
  - redis-tools

contents:
  # ── Application code (venv + backend + frontend) ──────────────────────
  - src: staging/usr/lib/labdog/
    dst: /usr/lib/labdog/
    type: tree
    file_info:
      owner: root
      group: root
      mode: 0755

  # ── Config file (config|noreplace — preserved on upgrade) ─────────────
  - src: etc/labdog.toml
    dst: /etc/labdog/labdog.toml
    type: config|noreplace
    file_info:
      mode: 0640
      owner: root
      group: labdog

  # ── Systemd units ──────────────────────────────────────────────────────
  - src: systemd/labdog.service
    dst: /usr/lib/systemd/system/labdog.service

  # ── tmpfiles.d ─────────────────────────────────────────────────────────
  - src: tmpfiles.d/labdog.conf
    dst: /usr/lib/tmpfiles.d/labdog.conf

  # ── Owned directories ──────────────────────────────────────────────────
  - dst: /etc/labdog/
    type: dir
    file_info:
      owner: root
      group: labdog
      mode: 0750
  - dst: /var/lib/labdog/
    type: dir
    file_info:
      owner: labdog
      group: labdog
      mode: 0750
  - dst: /var/log/labdog/
    type: dir
    file_info:
      owner: labdog
      group: labdog
      mode: 0750

scripts:
  preinstall:  scripts/preinst.sh
  postinstall: scripts/postinst.sh
  preremove:   scripts/prerm.sh
  postremove:  scripts/postrm.sh

deb:
  compression: zstd

overrides:
  rpm:
    depends:
      - python3.12
    recommends:
      - postgresql
      - redis
