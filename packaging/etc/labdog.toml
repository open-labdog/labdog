# ============================================================
# LabDog Configuration
# ============================================================
# Production configuration for LabDog.
# Copy this file to /etc/labdog/labdog.toml and update
# all REQUIRED values before starting the service.
#
# Every setting can be overridden via environment variables
# using the prefix LABDOG_ with double-underscore separators:
#   LABDOG_SERVER__PORT=9000       → [server] port
#   LABDOG_DATABASE__URL=...       → [database] url
#   LABDOG_SECURITY__SECRET_KEY=.. → [security] secret_key

# ── Server ───────────────────────────────────────────────────
[server]
# Bind address — use 127.0.0.1 when behind a reverse proxy
host = "127.0.0.1"
# Backend API port
port = 8000
# Path to frontend static export directory (Next.js `out/`).
# Leave empty (default) to auto-detect:
#   - ../frontend/out  (development)
#   - /usr/lib/labdog/frontend/out  (production)
# Set to a path to override, or "none" to disable static serving.
# static_dir = ""
# Trusted reverse-proxy IPs/CIDRs — X-Forwarded-For is only
# honoured from these sources (important for audit logs)
trusted_proxies = []
# Uvicorn's --forwarded-allow-ips (comma-separated string)
forwarded_allow_ips = "127.0.0.1"

# ── Database ─────────────────────────────────────────────────
[database]
# PostgreSQL async connection string (REQUIRED)
url = "postgresql+asyncpg://labdog:CHANGE_ME@localhost:5432/labdog"
# Connection pool tuning
pool_size = 5
max_overflow = 10
pool_timeout = 30

# ── Redis ────────────────────────────────────────────────────
[redis]
# Redis connection string for Celery broker (REQUIRED)
url = "redis://localhost:6379/0"

# ── Security ─────────────────────────────────────────────────
[security]
# JWT signing key (REQUIRED — MUST CHANGE)
# Generate with: openssl rand -base64 32
secret_key = "CHANGE_ME"

# AES-256-GCM master key for SSH key encryption (REQUIRED — MUST CHANGE)
# Must be exactly 32 bytes, base64-encoded
# Generate with: openssl rand -base64 32
encryption_key = "CHANGE_ME"

# IP of the LabDog server — used in the auto-injected SSH
# lockout prevention rule (REQUIRED)
labdog_server_ip = "127.0.0.1"

# CORS allowed origins
allowed_origins = ["http://localhost:3000"]

# Cookie security — set true in production with HTTPS
cookie_secure = false
# Restrict cookies to a specific domain (empty = auto)
cookie_domain = ""
# JWT / cookie lifetime in seconds (default: 24 hours)
session_lifetime_seconds = 86400

# ── TLS ──────────────────────────────────────────────────────
[tls]
# Path to TLS certificate file — enables HTTPS on uvicorn directly
# Leave empty to disable (use a reverse proxy for TLS instead)
cert_file = ""
# Path to TLS private key file
key_file = ""
# Redirect all HTTP requests to HTTPS
force_https = false

# ── Rate Limiting ────────────────────────────────────────────
[rate_limit]
# Enable rate limiting (uses Redis as backend)
enabled = true
# Login endpoint limit (brute-force protection)
login = "5/minute"
# General API limit per client IP
api = "100/minute"

# ── Logging ──────────────────────────────────────────────────
[logging]
# Log level: debug, info, warning, error, critical
level = "info"
# Output format: "text" for human-readable, "json" for structured
format = "text"
# Auto-prune audit log entries older than N days (0 = keep forever)
audit_retention_days = 90

# ── SSH Terminal ─────────────────────────────────────────────
[ssh]
max_sessions_per_user = 5
max_total_sessions = 50
idle_timeout_seconds = 1800
# SSH connection timeout in seconds
connect_timeout = 10
# Default SSH port for new hosts
default_port = 22

# ── Host Discovery ───────────────────────────────────────────
[discovery]
# Smallest allowed CIDR prefix (/20 = 4094 hosts)
min_prefix = 20
# Per-host TCP scan timeout in seconds
scan_timeout = 1.0
# Max simultaneous TCP connections during scan
max_concurrent = 100
# Max hosts per bulk-add request
max_bulk_add = 50

# ── Drift Detection ─────────────────────────────────────────
[drift]
# Automatic drift check interval in minutes (0 = disabled)
check_interval_minutes = 30
