stages:
  - lint
  - test
  - build
  - scan

variables:
  IMAGE: gitlab.lan.tyresson.se:5050/dennis/barricade
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

.docker-wait: &docker-wait
  - until docker info >/dev/null 2>&1; do sleep 1; done

.docker-login: &docker-login
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY


# --- Static code analysis ---

backend-lint:
  stage: lint
  image: python:3.12-slim
  cache:
    key: backend-pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  script:
    - pip install -U pip -q
    - pip install uv -q
    - uv pip install --system ruff -q
    - cd backend
    - ruff check .
    - ruff format --check .
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - backend/**/*

backend-sast:
  stage: lint
  image: python:3.12-slim
  cache:
    key: backend-pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  script:
    - pip install -U pip -q
    - pip install uv -q
    - uv pip install --system "bandit>=1.9" -q
    - cd backend
    # Fail only on findings not present in the baseline; run over severity
    # Low+ so any new issue at any level is caught.
    - bandit -r app/ -l --baseline bandit-baseline.json
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - backend/**/*

frontend-lint:
  stage: lint
  image: node:20-alpine
  cache:
    key: frontend-npm-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/npm
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci --prefer-offline
    - npm run lint
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - frontend/**/*


# --- Tests ---

backend-test:
  stage: test
  image: python:3.12-slim
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_DB: barricade_test
    POSTGRES_USER: barricade
    POSTGRES_PASSWORD: barricade
    DATABASE_URL: "postgresql+asyncpg://barricade:barricade@postgres:5432/barricade_test"
    REDIS_URL: "redis://redis:6379/0"
    SECRET_KEY: "ci-test-secret-key-not-for-production"
    ENCRYPTION_KEY: "Y2ktdGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVz"
  cache:
    key: backend-pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  script:
    - apt-get update -qq && apt-get install -y -qq git
    - cd backend
    - pip install -U pip -q
    - pip install uv -q
    - uv pip install --system '.[dev]'
    - python -m pytest tests/ -v -m "not integration" --ignore=tests/integration
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - backend/**/*

frontend-build-check:
  stage: test
  image: node:20-alpine
  cache:
    key: frontend-npm-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/npm
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci --prefer-offline
    - npm run build
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - frontend/**/*

docs-build-check:
  stage: test
  image: node:20-alpine
  cache:
    key: docs-npm-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/npm
      - website/node_modules/
  script:
    - cd website
    - npm ci --prefer-offline
    - npm run build
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - docs/**/*
        - website/**/*


# --- Build & publish ---

build-image:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
      command: ["--insecure-registry", "gitlab.lan.tyresson.se:5050"]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  before_script:
    - *docker-wait
    - *docker-login
  script:
    - |
      docker build \
        -t $IMAGE:latest \
        -t $IMAGE:$CI_COMMIT_SHORT_SHA \
        -f Dockerfile \
        .
    - docker push $IMAGE:latest
    - docker push $IMAGE:$CI_COMMIT_SHORT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - backend/**/*
        - frontend/**/*

build-test-image:
  stage: build
  image: docker:24
  services:
    - name: docker:24-dind
      command: ["--insecure-registry", "gitlab.lan.tyresson.se:5050"]
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  before_script:
    - *docker-wait
    - *docker-login
  script:
    - |
      docker build \
        -t $IMAGE:test \
        -t $IMAGE:test-$CI_COMMIT_SHORT_SHA \
        -f Dockerfile \
        .
    - docker push $IMAGE:test
    - docker push $IMAGE:test-$CI_COMMIT_SHORT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - backend/**/*
        - frontend/**/*

pages:
  stage: build
  image: node:20-alpine
  cache:
    key: docs-npm-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/npm
      - website/node_modules/
  script:
    - cd website
    - npm ci --prefer-offline
    - npm run build
    - mv build ../public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - docs/**/*
        - website/**/*


# --- Security scans ---

trivy-scan:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  needs:
    - job: build-test-image
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: ".trivycache/"
    TRIVY_USERNAME: $CI_REGISTRY_USER
    TRIVY_PASSWORD: $CI_REGISTRY_PASSWORD
    TRIVY_INSECURE: "true"
  cache:
    key: trivy-db
    paths:
      - .trivycache/
  script:
    - trivy image --exit-code 0 --severity LOW,MEDIUM $IMAGE:test-$CI_COMMIT_SHORT_SHA
    - trivy image --exit-code 1 --severity HIGH,CRITICAL $IMAGE:test-$CI_COMMIT_SHORT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - backend/**/*
        - frontend/**/*

gitleaks:
  stage: scan
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  needs: []
  script:
    - gitleaks detect --source . --verbose --redact --no-banner
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - backend/**/*
        - frontend/**/*

backend-audit:
  stage: scan
  image: python:3.12-slim
  needs: []
  cache:
    key: backend-pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  script:
    - pip install -U pip -q
    - pip install uv -q
    - uv pip install --system pip-audit -q
    - cd backend
    - uv pip install --system . -q
    - pip-audit --progress-spinner off
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - backend/**/*

frontend-audit:
  stage: scan
  image: node:20-alpine
  needs: []
  cache:
    key: frontend-npm-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/npm
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci --prefer-offline
    - npm audit --audit-level=high --omit=dev
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
      changes:
        - frontend/**/*
