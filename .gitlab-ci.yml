stages:
  - test
  - build
  - package
  - release

variables:
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend
  VERSION: $CI_COMMIT_TAG
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

.docker-login: &docker-login
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

.docker-build-tags: &docker-build-tags
  - |
    TAGS="-t $IMAGE:$CI_COMMIT_SHA"
    if [ -n "$CI_COMMIT_TAG" ]; then
      TAGS="$TAGS -t $IMAGE:$CI_COMMIT_TAG"
    fi
    if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
      TAGS="$TAGS -t $IMAGE:latest"
    fi


backend-test:
  stage: test
  image: python:3.12-slim
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_DB: barricade_test
    POSTGRES_USER: barricade
    POSTGRES_PASSWORD: barricade
    DATABASE_URL: "postgresql+asyncpg://barricade:barricade@postgres:5432/barricade_test"
    REDIS_URL: "redis://redis:6379/0"
    SECRET_KEY: "ci-test-secret-key-not-for-production"
    ENCRYPTION_KEY: "Y2ktdGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVz"
  cache:
    key: backend-pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  script:
    - cd backend
    - pip install uv
    - uv pip install --system '.[dev]'
    - python -m pytest tests/ -v
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

frontend-build-check:
  stage: test
  image: node:20-alpine
  cache:
    key: frontend-npm-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/npm
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npm run build
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG


build-backend-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE: $CI_REGISTRY_IMAGE/backend
  before_script:
    - *docker-login
  script:
    - *docker-build-tags
    - >-
      docker build
      $TAGS
      -f backend/Dockerfile
      backend/
    - docker push $IMAGE --all-tags
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

build-frontend-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE: $CI_REGISTRY_IMAGE/frontend
  before_script:
    - *docker-login
  script:
    - *docker-build-tags
    - >-
      docker build
      $TAGS
      -f frontend/Dockerfile
      frontend/
    - docker push $IMAGE --all-tags
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG


build-packages:
  stage: package
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq
    - >-
      apt-get install -y -qq
      software-properties-common curl tar gzip
      dpkg-dev rpm
    - add-apt-repository -y ppa:deadsnakes/ppa
    - apt-get update -qq
    - apt-get install -y -qq python3.12 python3.12-venv python3-pip
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y -qq nodejs
    - >-
      curl -sfL https://github.com/goreleaser/nfpm/releases/download/v2.41.1/nfpm_2.41.1_linux_amd64.tar.gz
      | tar -xz -C /usr/local/bin nfpm
    - chmod +x /usr/local/bin/nfpm
  script:
    - cd packaging
    - >-
      VERSION=${CI_COMMIT_TAG:-$(grep '^version' ../backend/pyproject.toml
      | head -1 | sed 's/.*= *"\(.*\)"/\1/')}
    - echo "Building version $VERSION"
    - chmod +x build.sh
    - ./build.sh --version=$VERSION --target=all
  artifacts:
    paths:
      - packaging/dist/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG


create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Barricade $CI_COMMIT_TAG"
    description: "Release $CI_COMMIT_TAG"
    assets:
      links:
        - name: "barricade-${CI_COMMIT_TAG}-linux-amd64.tar.gz"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/packaging/dist/barricade-${CI_COMMIT_TAG}-linux-amd64.tar.gz"
          link_type: package
        - name: "barricade_${CI_COMMIT_TAG}_amd64.deb"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/packaging/dist/barricade_${CI_COMMIT_TAG}_amd64.deb"
          link_type: package
        - name: "barricade-${CI_COMMIT_TAG}-1.x86_64.rpm"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/packaging/dist/barricade-${CI_COMMIT_TAG}-1.x86_64.rpm"
          link_type: package
  needs:
    - job: build-packages
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
