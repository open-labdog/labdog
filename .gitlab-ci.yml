stages:
  - test
  - build
  - package
  - release

variables:
  BACKEND_IMAGE: $CI_REGISTRY_IMAGE/backend
  FRONTEND_IMAGE: $CI_REGISTRY_IMAGE/frontend
  AIO_IMAGE: $CI_REGISTRY_IMAGE/aio
  VERSION: $CI_COMMIT_TAG
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

.docker-login: &docker-login
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

.docker-build-tags: &docker-build-tags
  - |
    TAGS="-t $IMAGE:$CI_COMMIT_SHA"
    if [ -n "$CI_COMMIT_TAG" ]; then
      TAGS="$TAGS -t $IMAGE:$CI_COMMIT_TAG"
    fi
    if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
      TAGS="$TAGS -t $IMAGE:latest"
    fi


backend-test:
  stage: test
  image: python:3.12-slim
  services:
    - name: postgres:16-alpine
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_DB: barricade_test
    POSTGRES_USER: barricade
    POSTGRES_PASSWORD: barricade
    DATABASE_URL: "postgresql+asyncpg://barricade:barricade@postgres:5432/barricade_test"
    REDIS_URL: "redis://redis:6379/0"
    SECRET_KEY: "ci-test-secret-key-not-for-production"
    ENCRYPTION_KEY: "Y2ktdGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVz"
  cache:
    key: backend-pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
  script:
    - apt-get update -qq && apt-get install -y -qq git
    - cd backend
    - pip install uv
    - uv pip install --system '.[dev]'
    - python -m pytest tests/ -v -m "not integration" --ignore=tests/integration
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH

frontend-build-check:
  stage: test
  image: node:20-alpine
  cache:
    key: frontend-npm-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/npm
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci
    - npm run build
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH


build-backend-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE: $CI_REGISTRY_IMAGE/backend
  before_script:
    - *docker-login
  script:
    - *docker-build-tags
    - >-
      docker build
      $TAGS
      -f backend/Dockerfile
      backend/
    - docker push $IMAGE --all-tags
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build-frontend-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE: $CI_REGISTRY_IMAGE/frontend
  before_script:
    - *docker-login
  script:
    - *docker-build-tags
    - >-
      docker build
      $TAGS
      -f frontend/Dockerfile
      frontend/
    - docker push $IMAGE --all-tags
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build-aio-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE: $CI_REGISTRY_IMAGE/aio
  before_script:
    - *docker-login
  script:
    - *docker-build-tags
    - >-
      docker build
      $TAGS
      -f Dockerfile
      .
    - docker push $IMAGE --all-tags
  allow_failure: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/


build-packages:
  stage: package
  needs: []
  image: ubuntu:22.04
  variables:
    NFPM_VERSION: "2.41.1"
    DEBIAN_FRONTEND: noninteractive
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq software-properties-common curl tar gzip dpkg-dev rpm
    - add-apt-repository -y ppa:deadsnakes/ppa
    - apt-get update -qq
    - apt-get install -y -qq python3.12 python3.12-venv python3.12-dev
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y -qq nodejs
    - >-
      curl -sfL
      https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_linux_amd64.tar.gz
      | tar -xz -C /usr/local/bin nfpm
    - chmod +x /usr/local/bin/nfpm
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    - echo "Building version $VERSION"
    - cd packaging
    - chmod +x build.sh
    - ./build.sh --version="$VERSION" --target=all
    - cd dist
    - sha256sum barricade-* barricade_* > SHA256SUMS
    - cat SHA256SUMS
  artifacts:
    paths:
      - packaging/dist/
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/


upload-packages:
  stage: release
  image: curlimages/curl:latest
  variables:
    GIT_STRATEGY: none
  script:
    - VERSION=${CI_COMMIT_TAG#v}
    - REGISTRY="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/barricade/${VERSION}"
    - |
      for f in packaging/dist/barricade-* packaging/dist/barricade_* packaging/dist/SHA256SUMS; do
        [ -f "$f" ] || continue
        filename=$(basename "$f")
        echo "Uploading $filename ..."
        curl --fail --silent --show-error \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$f" \
          "${REGISTRY}/${filename}"
      done
  needs:
    - job: build-packages
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/


create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  variables:
    GIT_STRATEGY: none
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Barricade $CI_COMMIT_TAG"
    description: |
      ## Barricade $CI_COMMIT_TAG

      ### Installation

      Download the package for your distribution below, or use the tarball for manual installation.
      See the [install guide](README.md) for full instructions.
    assets:
      links:
        - name: "barricade-${CI_COMMIT_TAG#v}-linux-amd64.tar.gz"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/barricade/${CI_COMMIT_TAG#v}/barricade-${CI_COMMIT_TAG#v}-linux-amd64.tar.gz"
          link_type: package
        - name: "barricade_${CI_COMMIT_TAG#v}_amd64.deb"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/barricade/${CI_COMMIT_TAG#v}/barricade_${CI_COMMIT_TAG#v}_amd64.deb"
          link_type: package
        - name: "barricade-${CI_COMMIT_TAG#v}-1.x86_64.rpm"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/barricade/${CI_COMMIT_TAG#v}/barricade-${CI_COMMIT_TAG#v}-1.x86_64.rpm"
          link_type: package
        - name: "SHA256SUMS"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/barricade/${CI_COMMIT_TAG#v}/SHA256SUMS"
          link_type: other
  needs:
    - job: upload-packages
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
